<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8922A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12121A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background square with subtle rounded corners -->
  <rect width="120" height="120" fill="url(#bgGrad)" rx="16"/>

  <!-- Gold border -->
  <rect x="4" y="4" width="112" height="112" fill="none" stroke="url(#goldGrad)" stroke-width="1" rx="13" opacity="0.6"/>

  <!-- P letter -->
  <text
    x="14"
    y="82"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="#FFFFFF"
    opacity="0.95"
  >P</text>

  <!-- V letter — gold, slightly offset for layered depth -->
  <text
    x="52"
    y="88"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="url(#goldGrad)"
  >V</text>

  <!-- Tiny bottom accent line -->
  <rect x="14" y="96" width="92" height="1" fill="url(#goldGrad)" opacity="0.4" rx="1"/>

</svg>